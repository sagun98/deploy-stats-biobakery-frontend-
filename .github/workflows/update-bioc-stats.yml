name: Update Bioconductor Stats

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 03:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Bioconductor stats
        run: node scripts/fetch-bioc-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/bioc-stats.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update Bioconductor stats [skip ci]" && git push)
